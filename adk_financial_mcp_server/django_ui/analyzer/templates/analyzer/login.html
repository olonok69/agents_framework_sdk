<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - MCP Stock Analyzer</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
    .box { max-width: 420px; margin: 60px auto; background: #fff; border: 1px solid #e3e8f0; border-radius: 10px; padding: 20px; }
    label { display: block; margin: 8px 0 6px; font-weight: 600; }
    input { width: 100%; padding: 8px; border: 1px solid #cfd8e6; border-radius: 6px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 10px 14px; background: #265cff; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .error { color: #b42318; }
    a { color: #265cff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Login</h2>
    {% if success %}
      <p>Login successful. <a href="/">Go to dashboard</a></p>
    {% elif logged_out %}
      <p>You are logged out. <a href="/">Go home</a></p>
    {% elif already %}
      <p>You are already logged in. <a href="/">Go to dashboard</a></p>
    {% else %}
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
      </form>
      <p><a href="/register/">Create account</a></p>
    {% endif %}
  </div>
</body>
</html>
