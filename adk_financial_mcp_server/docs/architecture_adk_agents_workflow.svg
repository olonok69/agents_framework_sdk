<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <linearGradient id="entryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pipelineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrowStrong" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7C3AED"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#F8FAFC"/>

  <text x="450" y="34" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0F172A" text-anchor="middle">ADK Agent Workflow (Focused View)</text>
  <text x="450" y="54" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Orchestration path and related runtime files</text>

  <rect x="28" y="70" width="844" height="526" rx="12" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="48" y="93" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569">AGENT ORCHESTRATION FLOW</text>

  <!-- Entry -->
  <g filter="url(#shadow)">
    <rect x="80" y="120" width="220" height="74" rx="8" fill="url(#entryGrad)"/>
    <text x="190" y="150" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">API ENTRYPOINT</text>
    <text x="190" y="170" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">stock_analyzer_bot/api.py</text>
  </g>

  <!-- Pipeline -->
  <g filter="url(#shadow)">
    <rect x="340" y="112" width="480" height="270" rx="10" fill="url(#pipelineGrad)"/>
    <text x="580" y="140" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">ADK ORCHESTRATION CORE</text>
    <text x="580" y="160" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.92)" text-anchor="middle">stock_analyzer_bot/adk_bot.py</text>

    <!-- Agent steps -->
    <rect x="366" y="182" width="102" height="62" rx="7" fill="url(#agentGrad)"/>
    <text x="417" y="206" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">ORCHESTRATOR</text>
    <text x="417" y="223" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle">plan + route</text>

    <rect x="492" y="182" width="102" height="62" rx="7" fill="url(#agentGrad)"/>
    <text x="543" y="206" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">SPECIALIST</text>
    <text x="543" y="223" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle">analysis draft</text>

    <rect x="618" y="182" width="102" height="62" rx="7" fill="url(#agentGrad)"/>
    <text x="669" y="206" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">CRITIC</text>
    <text x="669" y="223" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle">quality checks</text>

    <rect x="492" y="266" width="102" height="62" rx="7" fill="url(#agentGrad)"/>
    <text x="543" y="290" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">REPORTER</text>
    <text x="543" y="307" font-family="Inter, system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.9)" text-anchor="middle">final narrative</text>

    <line x1="468" y1="213" x2="490" y2="213" stroke="rgba(255,255,255,0.9)" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="594" y1="213" x2="616" y2="213" stroke="rgba(255,255,255,0.9)" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="669" y1="244" x2="669" y2="297" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
    <line x1="669" y1="297" x2="594" y2="297" stroke="rgba(255,255,255,0.9)" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="492" y1="297" x2="470" y2="297" stroke="rgba(255,255,255,0.9)" stroke-width="2" marker-end="url(#arrow)"/>

    <text x="392" y="349" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">- mode/risk context assembly</text>
    <text x="392" y="365" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">- taxonomy claim checks + rewrite</text>
  </g>

  <line x1="300" y1="157" x2="336" y2="157" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="318" y="147" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">invoke runner</text>

  <!-- Related files row -->
  <rect x="70" y="430" width="760" height="140" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
  <text x="90" y="453" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#4338CA">RELATED FILES USED BY AGENTS</text>

  <g filter="url(#shadow)">
    <rect x="90" y="470" width="176" height="84" rx="8" fill="white" stroke="#BFDBFE" stroke-width="2"/>
    <text x="178" y="494" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1E3A8A" text-anchor="middle">ADK BRIDGE</text>
    <text x="178" y="512" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" text-anchor="middle">stock_analyzer_bot</text>
    <text x="178" y="526" font-family="monospace" font-size="8.5" fill="#0F172A" text-anchor="middle">adk_bridge.py</text>
    <text x="178" y="541" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569" text-anchor="middle">agent runtime helpers</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="282" y="470" width="176" height="84" rx="8" fill="white" stroke="#BAE6FD" stroke-width="2"/>
    <text x="370" y="494" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0C4A6E" text-anchor="middle">MCP TOOLS</text>
    <text x="370" y="512" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" text-anchor="middle">stock_analyzer_bot</text>
    <text x="370" y="526" font-family="monospace" font-size="8.5" fill="#0F172A" text-anchor="middle">mcp_tools.py</text>
    <text x="370" y="541" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569" text-anchor="middle">deterministic metric calls</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="474" y="470" width="176" height="84" rx="8" fill="white" stroke="#BAE6FD" stroke-width="2"/>
    <text x="562" y="494" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0C4A6E" text-anchor="middle">MCP CLIENT</text>
    <text x="562" y="512" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" text-anchor="middle">stock_analyzer_bot</text>
    <text x="562" y="526" font-family="monospace" font-size="8.5" fill="#0F172A" text-anchor="middle">mcp_client.py</text>
    <text x="562" y="541" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#475569" text-anchor="middle">MCP session lifecycle</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="666" y="470" width="144" height="84" rx="8" fill="white" stroke="#DDD6FE" stroke-width="2"/>
    <text x="738" y="494" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5B21B6" text-anchor="middle">GUARDRAILS</text>
    <text x="738" y="512" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" text-anchor="middle">docs</text>
    <text x="738" y="526" font-family="monospace" font-size="8" fill="#0F172A" text-anchor="middle">analysis_strategy_</text>
    <text x="738" y="538" font-family="monospace" font-size="8" fill="#0F172A" text-anchor="middle">catalog.json</text>
  </g>

  <line x1="560" y1="382" x2="560" y2="430" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrowStrong)"/>
  <line x1="417" y1="382" x2="370" y2="470" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arrowStrong)"/>
  <line x1="543" y1="382" x2="562" y2="470" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arrowStrong)"/>
  <line x1="669" y1="382" x2="738" y2="470" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arrowStrong)"/>

  <text x="66" y="604" font-family="monospace" font-size="9" fill="#64748B">Focus scope: agent runtime workflow only (no full MCP server/data-layer topology)</text>
</svg>
