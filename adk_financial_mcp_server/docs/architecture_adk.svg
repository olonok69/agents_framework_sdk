    <text x="245" y="424" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">MCP CLIENT + WRAPPERS</text>
    <text x="245" y="444" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">mcp_client.py + mcp_tools.py</text>
    <text x="245" y="460" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.85)" text-anchor="middle">persistent stdio session</text>
