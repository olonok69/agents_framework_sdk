    <text x="450" y="314" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">Taxonomy contract + post-check validator (rewrite/block)</text>
    <text x="450" y="334" font-family="Inter, system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">Grounded on MCP tool output metrics</text>
