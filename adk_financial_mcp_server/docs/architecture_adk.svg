  <rect width="900" height="650" fill="#F8FAFC"/>

  <text x="450" y="34" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0F172A" text-anchor="middle">ADK Architecture - MCP Financial Analysis Runtime</text>

  <rect x="28" y="54" width="844" height="580" rx="12" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="48" y="78" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569">ADK-FIRST FLOW (production path)</text>

