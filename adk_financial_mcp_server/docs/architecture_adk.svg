    <text x="726" y="572" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">Market Data</text>
    <text x="726" y="588" font-family="Inter, system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)" text-anchor="middle">Yahoo Finance</text>
  </g>

  <line x1="245" y1="474" x2="245" y2="548" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="52" y="218" width="170" height="132" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="137" y="238" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#475569" text-anchor="middle">ADK TRAITS</text>
  <text x="66" y="260" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#065F46">✓ Multi-agent critique loop</text>
  <text x="66" y="278" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#065F46">✓ Grounded metric references</text>
  <text x="66" y="296" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#065F46">✓ Taxonomy enforcement</text>
  <text x="66" y="314" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7C2D12">⚠ Requires model API access</text>
  <text x="66" y="332" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7C2D12">⚠ Strict no-fabrication guardrails</text>

  <text x="94" y="408" font-family="monospace" font-size="9" fill="#64748B">adk_bot.py</text>
  <text x="548" y="410" font-family="monospace" font-size="9" fill="#64748B">analysis_strategy_catalog.json</text>
  <text x="90" y="560" font-family="monospace" font-size="9" fill="#64748B">server/main.py</text>
